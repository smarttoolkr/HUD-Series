
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD Series</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0f1f;
  color: white;
}

section {
  padding: 80px 20px;
  text-align: center;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: radial-gradient(circle at center, #122b5c, #0a0f1f);
}

.hero h1 {
  font-size: 60px;
  margin: 10px 0;
}

.hero p {
  font-size: 20px;
  color: #aab8ff;
}

.btn {
  margin-top: 30px;
  padding: 15px 30px;
  background: #2b6cff;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.section-title {
  font-size: 36px;
  margin-bottom: 20px;
}

.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #11182f;
  padding: 30px;
  width: 250px;
  border-radius: 12px;
}

.card h3 {
  margin-bottom: 10px;
}

.beta input {
  padding: 12px;
  margin: 5px;
  width: 220px;
}

.beta button {
  padding: 12px 24px;
  background: #2b6cff;
  border: none;
  color: white;
  cursor: pointer;
}

footer {
  padding: 30px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>HUD Series</h1>
  <p>공간 정보를 당신의 현실 위에</p>
  <a href="#beta" class="btn">베타 신청</a>
</section>

<!-- CONCEPT -->
<section>
  <div class="section-title">We Overlay Reality</div>
  <p>정보를 보여주는 것이 아니라, 현실 위에 겹쳐 인지하게 만듭니다.</p>
</section>

<!-- PRODUCTS -->
<section>
  <div class="section-title">Product Line</div>
  <div class="cards">

    <div class="card">
      <h3>Rider HUD</h3>
      <p>배달 라이더를 위한 실시간 공간 정보 시스템</p>
    </div>

    <div class="card">
      <h3>Care HUD</h3>
      <p>노인 및 보호자를 위한 안전 모니터링</p>
    </div>

    <div class="card">
      <h3>Vision HUD</h3>
      <p>시각 약자를 위한 공간 인식 지원</p>
    </div>

  </div>
</section>

<!-- BETA -->
<section id="beta" class="beta">
  <div class="section-title">Beta Access</div>

  <form name="beta" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="beta">

    <input name="name" placeholder="이름" required><br>
    <input name="contact" placeholder="연락처 / 이메일" required><br>

    <button type="submit">신청하기</button>
  </form>
</section>

<footer>
  Smart Tool Korea · HUD Series Beta
</footer>

</body>
</html>
