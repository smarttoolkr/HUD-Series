
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD Series</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border: 1px solid #2b6cff;
      border-radius: 20px;
      font-size: 12px;
      color: #7aa7ff;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    h2 {
      font-size: 20px;
      font-weight: 400;
      color: #b8c7ff;
      margin-bottom: 30px;
    }

    .desc {
      font-size: 16px;
      color: #9aa4c7;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .cta {
      display: inline-block;
      padding: 14px 28px;
      background: #2b6cff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .cta:hover {
      background: #1f4fd1;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #5c6b8a;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="badge">REAL-TIME PERCEPTION SYSTEM</div>

    <h1>HUD Series</h1>

    <h2>Real-time HUD system for human movement</h2>

    <div class="desc">
      공간 정보를 당신의 현실 위에.<br>
      우리는 정보를 보여주는 것이 아니라,<br>
      현실 위에 겹쳐 “인지”하게 만듭니다.
    </div>

    <a class="cta" href="#beta">베타 테스트 신청</a>

    <div class="footer">
      Smart Tool Korea · HUD Series Beta
    </div>

  </div>
</body>
</html>
